<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anarchy Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas-wrapper {
    position: absolute;
    inset: 0;
    cursor: grab;
    overflow: hidden;
    background: #111;
  }

  #canvas-wrapper.grabbing { cursor: grabbing; }

  #map-img {
    position: absolute;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    transform-origin: 0 0;
    user-select: none;
    pointer-events: none;
  }

  #crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    opacity: 0.2;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: #fff;
  }
  #crosshair::before { width: 12px; height: 1px; top: 0; left: -6px; }
  #crosshair::after  { width: 1px; height: 12px; top: -6px; left: 0; }

  #ui { position: absolute; inset: 0; pointer-events: none; }

  /* TOP RIGHT — dropdown */
  #top-bar {
    position: absolute;
    top: 16px; right: 16px;
    pointer-events: all;
  }

  #render-select {
    background: #1a1a1a;
    border: 1px solid #444;
    color: #ccc;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 7px 12px;
    cursor: pointer;
    letter-spacing: 0.06em;
    outline: none;
    min-width: 220px;
  }

  #render-select:hover { border-color: #666; color: #fff; }
  #render-select option { background: #1a1a1a; color: #ccc; }

  /* TOP LEFT — current render label */
  #dim-label {
    position: absolute;
    top: 16px; left: 16px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
    pointer-events: none;
  }

  /* BOTTOM — zoom + coords */
  #bottom-bar {
    position: absolute;
    bottom: 16px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 16px;
    background: #1a1a1acc;
    border: 1px solid #333;
    padding: 8px 18px;
    pointer-events: all;
    backdrop-filter: blur(4px);
  }

  #coords {
    font-size: 12px; color: #aaa;
    letter-spacing: 0.06em;
    min-width: 180px; text-align: center;
  }
  #coords span { color: #fff; }

  #zoom-label {
    font-size: 11px; color: #666;
    letter-spacing: 0.08em;
    min-width: 55px; text-align: right;
  }

  #zoom-controls { display: flex; gap: 4px; }

  .zoom-btn {
    background: #222; border: 1px solid #333;
    color: #aaa; font-family: 'Courier New', monospace;
    font-size: 14px; width: 26px; height: 26px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: background 0.1s, color 0.1s;
  }
  .zoom-btn:hover { background: #2e2e2e; color: #fff; }

  /* LOADING */
  #loading {
    position: absolute; inset: 0;
    background: #0a0a0a;
    display: flex; align-items: center;
    justify-content: center; flex-direction: column;
    gap: 12px; z-index: 100;
  }
  #loading p { font-size: 12px; letter-spacing: 0.1em; color: #555; text-transform: uppercase; }
  #loading .err {
    color: #884444; font-size: 11px;
    max-width: 420px; text-align: center; line-height: 1.6;
  }
  #err-hint { display: none; }
</style>
</head>
<body>

<div id="loading">
  <p id="loading-text">Loading renders...</p>
  <p class="err" id="err-hint">
    Не удалось загрузить renders.json или изображение.<br>
    Убедись что файлы лежат в правильных папках и сервер запущен.<br><br>
    Локально: <code>python -m http.server 8080</code>
  </p>
</div>

<div id="canvas-wrapper">
  <img id="map-img" draggable="false" alt="map" />
  <div id="crosshair"></div>
</div>

<div id="ui">
  <div id="dim-label">—</div>

  <div id="top-bar">
    <select id="render-select" onchange="onSelectChange()">
      <option disabled selected>Загрузка...</option>
    </select>
  </div>

  <div id="bottom-bar">
    <div id="zoom-controls">
      <button class="zoom-btn" onclick="zoomBy(1.5)">+</button>
      <button class="zoom-btn" onclick="zoomBy(1/1.5)">−</button>
    </div>
    <div id="zoom-label">100%</div>
    <div id="coords">X: <span id="cx">0</span> &nbsp; Z: <span id="cz">0</span></div>
  </div>
</div>

<script>
// Парсит имя файла типа "overworld20260422" или "nether20260509"
function parseRenderName(name) {
  const dimMap = {
    overworld: 'Overworld',
    nether: 'Nether',
    theend: 'The End',
    end: 'The End'
  };

  const match = name.match(/^([a-z]+)(\d{4})(\d{2})(\d{2})$/);
  if (!match) return null;

  const [, dimRaw, year, month, day] = match;
  const dimLabel = dimMap[dimRaw] || dimRaw;
  const dateStr = `${year}.${month}.${day}`;

  return {
    file: `renders/${name}.png`,
    label: `${dimLabel} (${dateStr})`,
    dimLabel: `${dimLabel} — ${dateStr}`,
    size: null // определится после загрузки изображения
  };
}

let renders = [];
let currentRender = null;
let scale = 1;
let offsetX = 0, offsetY = 0;
let isDragging = false;
let lastX = 0, lastY = 0;

const img = document.getElementById('map-img');
const wrapper = document.getElementById('canvas-wrapper');
const loading = document.getElementById('loading');
const loadingText = document.getElementById('loading-text');
const errHint = document.getElementById('err-hint');
const dimLabel = document.getElementById('dim-label');
const zoomLabel = document.getElementById('zoom-label');
const cxEl = document.getElementById('cx');
const czEl = document.getElementById('cz');
const selectEl = document.getElementById('render-select');

function getViewport() {
  return { w: window.innerWidth, h: window.innerHeight };
}

function fitToScreen() {
  if (!currentRender) return;
  const vp = getViewport();
  const size = currentRender.size;
  scale = Math.min(vp.w / size, vp.h / size) * 0.95;
  offsetX = (vp.w - size * scale) / 2;
  offsetY = (vp.h - size * scale) / 2;
  applyTransform();
}

function applyTransform() {
  img.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
  zoomLabel.textContent = Math.round(scale * 100) + '%';
}

function updateCoords(clientX, clientY) {
  if (!currentRender) return;
  const size = currentRender.size;
  const half = size / 2;
  const px = (clientX - offsetX) / scale;
  const py = (clientY - offsetY) / scale;
  const x = Math.round(px - half);
  const z = Math.round(py - half);
  cxEl.textContent = x;
  czEl.textContent = z;
}

function zoomBy(factor, cx, cy) {
  const vp = getViewport();
  cx = cx ?? vp.w / 2;
  cy = cy ?? vp.h / 2;
  const prevScale = scale;
  scale = Math.max(0.02, Math.min(50, scale * factor));
  offsetX = cx - (cx - offsetX) * (scale / prevScale);
  offsetY = cy - (cy - offsetY) * (scale / prevScale);
  applyTransform();
}

function loadRender(render) {
  currentRender = render;
  loading.style.display = 'flex';
  errHint.style.display = 'none';
  loadingText.textContent = 'Loading ' + render.label + '...';
  dimLabel.textContent = render.dimLabel;

  const newImg = new Image();
  newImg.onload = () => {
    render.size = newImg.naturalWidth; // берём реальный размер
    img.src = newImg.src;
    loading.style.display = 'none';
    fitToScreen();
  };
  newImg.onerror = () => {
    loadingText.textContent = 'Ошибка загрузки';
    errHint.style.display = 'block';
  };
  newImg.src = render.file;
}

function onSelectChange() {
  const idx = selectEl.value;
  if (idx === '' || idx === undefined) return;
  loadRender(renders[idx]);
}

async function init() {
  try {
    const resp = await fetch('renders.json');
    if (!resp.ok) throw new Error('no renders.json');
    const names = await resp.json();

    renders = names.map(parseRenderName).filter(Boolean);

    if (renders.length === 0) {
      loadingText.textContent = 'Нет рендеров в renders.json';
      errHint.style.display = 'block';
      return;
    }

    selectEl.innerHTML = '';
    renders.forEach((r, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = r.label;
      selectEl.appendChild(opt);
    });

    selectEl.value = 0;
    loadRender(renders[0]);

  } catch (e) {
    loadingText.textContent = 'Ошибка загрузки';
    errHint.style.display = 'block';
  }
}

// Drag
wrapper.addEventListener('mousedown', e => {
  isDragging = true;
  lastX = e.clientX; lastY = e.clientY;
  wrapper.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  updateCoords(e.clientX, e.clientY);
  if (!isDragging) return;
  offsetX += e.clientX - lastX;
  offsetY += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  wrapper.classList.remove('grabbing');
});

// Zoom
wrapper.addEventListener('wheel', e => {
  e.preventDefault();
  zoomBy(e.deltaY < 0 ? 1.12 : 1/1.12, e.clientX, e.clientY);
}, { passive: false });

// Touch
wrapper.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  }
}, { passive: true });
wrapper.addEventListener('touchmove', e => {
  if (isDragging && e.touches.length === 1) {
    offsetX += e.touches[0].clientX - lastX;
    offsetY += e.touches[0].clientY - lastY;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    applyTransform();
  }
}, { passive: true });
wrapper.addEventListener('touchend', () => { isDragging = false; });

// Keys
window.addEventListener('keydown', e => {
  if (e.key === '+' || e.key === '=') zoomBy(1.2);
  if (e.key === '-') zoomBy(1/1.2);
  if (e.key === '0') fitToScreen();
});

window.addEventListener('resize', fitToScreen);

init();
</script>
</body>
</html>
